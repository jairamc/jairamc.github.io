{{ define "main" }}
  <div class="mt-12 mb-12 text-center">

    <!-- Lost in the distributed system illustration -->
    <div class="mx-auto mb-8" style="max-width: 320px;">
      <svg viewBox="0 0 320 240" xmlns="http://www.w3.org/2000/svg" class="w-full">
        <!-- Network nodes -->
        <circle cx="60" cy="60" r="18" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
        <circle cx="160" cy="40" r="18" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
        <circle cx="260" cy="70" r="18" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
        <circle cx="40" cy="170" r="18" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
        <circle cx="280" cy="180" r="18" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>

        <!-- Connections between nodes -->
        <line x1="60" y1="60" x2="160" y2="40" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
        <line x1="160" y1="40" x2="260" y2="70" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
        <line x1="60" y1="60" x2="40" y2="170" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
        <line x1="260" y1="70" x2="280" y2="180" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>

        <!-- Broken/dashed connection to the missing node -->
        <line x1="160" y1="40" x2="160" y2="140" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
        <line x1="40" y1="170" x2="160" y2="140" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
        <line x1="280" y1="180" x2="160" y2="140" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>

        <!-- The missing node — empty, with a question mark -->
        <circle cx="160" cy="140" r="24" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 3" opacity="0.6"/>
        <text x="160" y="148" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#ef4444" opacity="0.7">?</text>

        <!-- Node labels -->
        <text x="60" y="64" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa" opacity="0.7">200</text>
        <text x="160" y="44" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa" opacity="0.7">200</text>
        <text x="260" y="74" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa" opacity="0.7">200</text>
        <text x="40" y="174" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa" opacity="0.7">200</text>
        <text x="280" y="184" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa" opacity="0.7">200</text>

        <!-- Timeout label -->
        <text x="160" y="190" text-anchor="middle" font-family="monospace" font-size="11" fill="#ef4444" opacity="0.5">CONNECTION_REFUSED</text>
      </svg>
    </div>

    <h1 class="mb-3 text-7xl font-extrabold text-neutral-900 dark:text-neutral">404</h1>

    <p class="mb-2 text-xl text-neutral-600 dark:text-neutral-400">
      This page has left the cluster.
    </p>

    <p class="mb-10 text-base text-neutral-400 dark:text-neutral-500 italic">
      We've checked all the nodes. Rebalanced the partitions. Even tried turning it off and on again. It's just not here.
      <br/>If it helps, the monitoring dashboard says everything is fine.
    </p>

    <div class="flex justify-center gap-4">
      <a href="/"
        class="inline-block px-6 py-3 text-sm font-medium rounded-lg bg-primary-600 text-neutral hover:bg-primary-500 dark:bg-primary-400 dark:text-neutral-900 dark:hover:bg-primary-300">
        Back to safety
      </a>
      <a href="/posts/"
        class="inline-block px-6 py-3 text-sm font-medium rounded-lg border border-neutral-300 dark:border-neutral-600 text-neutral-700 dark:text-neutral-300 hover:bg-neutral-100 dark:hover:bg-neutral-700">
        Read something that exists
      </a>
    </div>
  </div>
{{ end }}
