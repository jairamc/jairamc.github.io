<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowMid" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Flowing curve gradients -->
    <linearGradient id="curveGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0"/>
      <stop offset="30%" stop-color="#2563eb" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#7c3aed" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="curveGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0"/>
      <stop offset="30%" stop-color="#0ea5e9" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#2563eb" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="curveGrad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="40%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- NO baked background — transparent so theme background shows through -->

  <!-- Ambient color washes — work on both dark and light -->
  <ellipse cx="300" cy="250" rx="500" ry="350" fill="#2563eb" opacity="0.08"/>
  <ellipse cx="1600" cy="800" rx="550" ry="400" fill="#7c3aed" opacity="0.08"/>
  <ellipse cx="960" cy="540" rx="700" ry="300" fill="#3b82f6" opacity="0.06"/>
  <ellipse cx="1700" cy="200" rx="400" ry="250" fill="#6366f1" opacity="0.06"/>
  <ellipse cx="200" cy="850" rx="450" ry="300" fill="#7c3aed" opacity="0.06"/>

  <!-- === FLOWING CURVES === -->
  <g fill="none" stroke-linecap="round">
    <path d="M-100,300 C300,100 600,500 960,350 S1500,150 2020,400" stroke="url(#curveGrad1)" stroke-width="2.5"/>
    <path d="M-100,350 C300,150 600,550 960,400 S1500,200 2020,450" stroke="url(#curveGrad1)" stroke-width="1.5" opacity="0.6"/>

    <path d="M-100,700 C400,900 700,500 960,750 S1400,950 2020,650" stroke="url(#curveGrad2)" stroke-width="2.5"/>
    <path d="M-100,750 C400,950 700,550 960,800 S1400,1000 2020,700" stroke="url(#curveGrad2)" stroke-width="1.5" opacity="0.6"/>

    <path d="M-100,540 C300,400 700,650 960,540 S1300,420 2020,580" stroke="url(#curveGrad3)" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- === NETWORK EDGES === -->
  <g stroke="#3b82f6" fill="none" opacity="0.2" stroke-width="1">
    <!-- Upper network -->
    <line x1="80" y1="120" x2="320" y2="200"/>
    <line x1="320" y1="200" x2="560" y2="140"/>
    <line x1="560" y1="140" x2="780" y2="240"/>
    <line x1="780" y1="240" x2="1050" y2="160"/>
    <line x1="1050" y1="160" x2="1300" y2="220"/>
    <line x1="1300" y1="220" x2="1540" y2="130"/>
    <line x1="1540" y1="130" x2="1780" y2="210"/>
    <line x1="1780" y1="210" x2="1900" y2="160"/>

    <!-- Lower network -->
    <line x1="100" y1="880" x2="350" y2="800"/>
    <line x1="350" y1="800" x2="580" y2="900"/>
    <line x1="580" y1="900" x2="820" y2="820"/>
    <line x1="820" y1="820" x2="1100" y2="910"/>
    <line x1="1100" y1="910" x2="1350" y2="830"/>
    <line x1="1350" y1="830" x2="1580" y2="920"/>
    <line x1="1580" y1="920" x2="1820" y2="860"/>

    <!-- Vertical bridges -->
    <line x1="80" y1="120" x2="100" y2="880"/>
    <line x1="320" y1="200" x2="350" y2="800"/>
    <line x1="560" y1="140" x2="580" y2="900"/>
    <line x1="780" y1="240" x2="820" y2="820"/>
    <line x1="1050" y1="160" x2="1100" y2="910"/>
    <line x1="1300" y1="220" x2="1350" y2="830"/>
    <line x1="1540" y1="130" x2="1580" y2="920"/>
    <line x1="1780" y1="210" x2="1820" y2="860"/>
  </g>

  <!-- Cross connections -->
  <g stroke="#6366f1" fill="none" opacity="0.12" stroke-width="0.8">
    <line x1="320" y1="200" x2="580" y2="900"/>
    <line x1="780" y1="240" x2="1100" y2="910"/>
    <line x1="1300" y1="220" x2="1580" y2="920"/>
    <line x1="560" y1="140" x2="350" y2="800"/>
    <line x1="1050" y1="160" x2="820" y2="820"/>
    <line x1="1540" y1="130" x2="1350" y2="830"/>
  </g>

  <!-- Mid-field triangles -->
  <g stroke="#3b82f6" fill="none" opacity="0.15" stroke-width="0.7">
    <path d="M150,450 L320,380 L200,560 Z"/>
    <path d="M1650,420 L1800,500 L1700,580 Z"/>
    <line x1="400" y1="500" x2="550" y2="580"/>
    <line x1="1400" y1="480" x2="1520" y2="560"/>
  </g>

  <!-- === NODES === -->

  <!-- Primary nodes -->
  <g filter="url(#glow)">
    <circle cx="80" cy="120" r="5" fill="#3b82f6" opacity="0.8"/>
    <circle cx="560" cy="140" r="6" fill="#3b82f6" opacity="0.75"/>
    <circle cx="1050" cy="160" r="6" fill="#6366f1" opacity="0.7"/>
    <circle cx="1540" cy="130" r="5" fill="#3b82f6" opacity="0.75"/>
    <circle cx="1900" cy="160" r="4" fill="#6366f1" opacity="0.6"/>

    <circle cx="100" cy="880" r="5" fill="#6366f1" opacity="0.7"/>
    <circle cx="580" cy="900" r="6" fill="#3b82f6" opacity="0.65"/>
    <circle cx="1100" cy="910" r="5" fill="#6366f1" opacity="0.65"/>
    <circle cx="1580" cy="920" r="6" fill="#3b82f6" opacity="0.7"/>
    <circle cx="1820" cy="860" r="4" fill="#6366f1" opacity="0.6"/>
  </g>

  <!-- Secondary nodes -->
  <g filter="url(#glowMid)">
    <circle cx="320" cy="200" r="4" fill="#60a5fa" opacity="0.65"/>
    <circle cx="780" cy="240" r="4" fill="#818cf8" opacity="0.6"/>
    <circle cx="1300" cy="220" r="4" fill="#60a5fa" opacity="0.6"/>
    <circle cx="1780" cy="210" r="3.5" fill="#818cf8" opacity="0.55"/>

    <circle cx="350" cy="800" r="4" fill="#818cf8" opacity="0.6"/>
    <circle cx="820" cy="820" r="4" fill="#60a5fa" opacity="0.55"/>
    <circle cx="1350" cy="830" r="4" fill="#818cf8" opacity="0.6"/>

    <circle cx="150" cy="450" r="3" fill="#60a5fa" opacity="0.5"/>
    <circle cx="320" cy="380" r="2.5" fill="#818cf8" opacity="0.45"/>
    <circle cx="200" cy="560" r="2.5" fill="#60a5fa" opacity="0.45"/>
    <circle cx="1650" cy="420" r="3" fill="#818cf8" opacity="0.5"/>
    <circle cx="1800" cy="500" r="2.5" fill="#60a5fa" opacity="0.45"/>
    <circle cx="1700" cy="580" r="2.5" fill="#818cf8" opacity="0.45"/>
  </g>

  <!-- Tiny scattered dots -->
  <g fill="#3b82f6" opacity="0.3">
    <circle cx="45" cy="60" r="1.5"/><circle cx="190" cy="30" r="1"/>
    <circle cx="430" cy="70" r="1.2"/><circle cx="670" cy="45" r="1.5"/>
    <circle cx="900" cy="80" r="1"/><circle cx="1150" cy="50" r="1.3"/>
    <circle cx="1400" cy="65" r="1"/><circle cx="1650" cy="40" r="1.5"/>
    <circle cx="1870" cy="70" r="1.2"/>
    <circle cx="60" cy="1010" r="1.5"/><circle cx="250" cy="1040" r="1"/>
    <circle cx="500" cy="1020" r="1.3"/><circle cx="750" cy="1050" r="1"/>
    <circle cx="1000" cy="1010" r="1.5"/><circle cx="1250" cy="1040" r="1.2"/>
    <circle cx="1500" cy="1020" r="1"/><circle cx="1750" cy="1050" r="1.3"/>
    <circle cx="400" cy="500" r="1"/><circle cx="550" cy="580" r="1.2"/>
    <circle cx="1400" cy="480" r="1"/><circle cx="1520" cy="560" r="1.2"/>
    <circle cx="700" cy="450" r="0.8"/><circle cx="1250" cy="600" r="0.8"/>
    <circle cx="850" cy="380" r="0.8"/><circle cx="1100" cy="650" r="0.8"/>
    <circle cx="960" cy="300" r="1"/><circle cx="960" cy="780" r="1"/>
  </g>

  <!-- Accent highlights -->
  <g filter="url(#glow)">
    <circle cx="560" cy="140" r="2.5" fill="#93c5fd" opacity="0.9"/>
    <circle cx="1580" cy="920" r="2.5" fill="#a5b4fc" opacity="0.8"/>
    <circle cx="1050" cy="160" r="2" fill="#93c5fd" opacity="0.7"/>
  </g>
</svg>